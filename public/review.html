<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revue images — permis vérifications</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #F7F4ED;
      color: #1C2128;
      padding: 32px 24px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #62686F; font-size: 14px; margin-bottom: 32px; }
    .subtitle code { background: #E8E3D8; padding: 2px 6px; border-radius: 4px; font-size: 13px; }

    .filters {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .filter-btn {
      padding: 6px 14px; border-radius: 999px; border: 1px solid #D0CABD;
      background: white; cursor: pointer; font-size: 13px; font-weight: 500;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #1B6BA0; color: #1B6BA0; }
    .filter-btn.active { background: #1B6BA0; border-color: #15527D; color: white; }

    .stats {
      display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap;
    }
    .stat {
      background: white; border: 1px solid #E5E0D5; border-radius: 10px;
      padding: 12px 20px; text-align: center; min-width: 100px;
    }
    .stat__num { font-size: 28px; font-weight: 700; line-height: 1; }
    .stat__label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #62686F; margin-top: 4px; }
    .stat--ok .stat__num { color: #2D7D32; }
    .stat--ko .stat__num { color: #C32A2A; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border: 2px solid #E5E0D5;
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(28,33,40,.1); }
    .card.ok   { border-color: #2D7D32; }
    .card.ko   { border-color: #C32A2A; }
    .card.hidden { display: none; }

    .card__img {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      display: block; background: #EDE8DC;
    }
    .card__body { padding: 10px 12px 12px; }
    .card__key {
      font-family: monospace; font-size: 10px; color: #9CA0A6;
      margin-bottom: 4px; letter-spacing: .03em;
    }
    .card__label {
      font-size: 13px; font-weight: 600; color: #1C2128;
      margin-bottom: 8px; line-height: 1.3;
    }
    .card__cat {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 999px; letter-spacing: .06em;
      margin-bottom: 8px;
    }
    .card__cat--int { background: #DCE9F2; color: #15527D; }
    .card__cat--ext { background: #E2E6EB; color: #4A5568; }

    .card__actions { display: flex; gap: 6px; }
    .btn-ok, .btn-ko {
      flex: 1; padding: 7px 0; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .btn-ok { background: #E6F3E7; color: #2D7D32; }
    .btn-ok:hover { background: #2D7D32; color: white; }
    .btn-ko { background: #F7E0E0; color: #C32A2A; }
    .btn-ko:hover { background: #C32A2A; color: white; }
    .card.ok .btn-ok { background: #2D7D32; color: white; }
    .card.ko .btn-ko { background: #C32A2A; color: white; }

    #copy-btn {
      margin-top: 32px;
      padding: 12px 24px; background: #1B6BA0; color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    #copy-btn:hover { background: #15527D; }

    #result-box {
      margin-top: 16px; padding: 16px; background: #1A1D24;
      border-radius: 10px; color: #F4F1E8; font-family: monospace;
      font-size: 12px; white-space: pre-wrap; display: none;
    }
  </style>
</head>
<body>

<h1>🔍 Revue des images correctes</h1>
<p class="subtitle">
  Valide (✓) ou rejette (✕) chaque image. Copie ensuite la liste des rejets
  et colle-la dans Claude pour remplacement automatique.
</p>

<div class="stats" id="stats">
  <div class="stat"><div class="stat__num" id="stat-total">59</div><div class="stat__label">Total</div></div>
  <div class="stat stat--ok"><div class="stat__num" id="stat-ok">0</div><div class="stat__label">Validées</div></div>
  <div class="stat stat--ko"><div class="stat__num" id="stat-ko">0</div><div class="stat__label">À remplacer</div></div>
  <div class="stat"><div class="stat__num" id="stat-pending">59</div><div class="stat__label">Non revues</div></div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filter('all')">Toutes (59)</button>
  <button class="filter-btn" onclick="filter('int')">Intérieur VI</button>
  <button class="filter-btn" onclick="filter('ext')">Extérieur VE</button>
  <button class="filter-btn" onclick="filter('ko')">À remplacer</button>
  <button class="filter-btn" onclick="filter('pending')">Non revues</button>
</div>

<div class="grid" id="grid"></div>

<button id="copy-btn" onclick="copyKo()">📋 Copier la liste des images à remplacer</button>
<div id="result-box"></div>

<script>
const GESTES = [
  // --- Intérieur ---
  { key: 'actionner-feux-detresse',          label: 'Actionner feux de détresse',       cat: 'int' },
  { key: 'air-pare-brise',                   label: 'Désembuage pare-brise',             cat: 'int' },
  { key: 'allumer-brouillard-arriere',       label: 'Allumer brouillard arrière',        cat: 'int' },
  { key: 'allumer-feux-route',               label: 'Allumer feux de route',             cat: 'int' },
  { key: 'attestation-assurance',            label: "Attestation d'assurance",           cat: 'int' },
  { key: 'avertisseur-sonore',               label: 'Avertisseur sonore',                cat: 'int' },
  { key: 'certificat-immatriculation',       label: 'Carte grise',                       cat: 'int' },
  { key: 'constat-amiable',                  label: 'Constat amiable',                   cat: 'int' },
  { key: 'degivrage-lunette-arriere',        label: 'Dégivrage lunette arrière',         cat: 'int' },
  { key: 'desactivation-airbag',             label: 'Désactivation airbag passager',     cat: 'int' },
  { key: 'essuie-glace-arriere',             label: 'Essuie-glace arrière',              cat: 'int' },
  { key: 'essuie-glaces-avant',              label: 'Essuie-glaces avant',               cat: 'int' },
  { key: 'ethylotest',                       label: 'Éthylotest',                        cat: 'int' },
  { key: 'feux-brouillard-arriere-controle', label: 'Contrôle brouillard arrière',       cat: 'int' },
  { key: 'feux-croisement',                  label: 'Feux de croisement',                cat: 'int' },
  { key: 'feux-detresse-controle',           label: 'Contrôle feux de détresse',         cat: 'int' },
  { key: 'feux-diurnes',                     label: 'Feux diurnes (DRL)',                cat: 'int' },
  { key: 'feux-position',                    label: 'Feux de position',                  cat: 'int' },
  { key: 'feux-recul',                       label: 'Feux de recul',                     cat: 'int' },
  { key: 'feux-route-controle',              label: 'Contrôle feux de route',            cat: 'int' },
  { key: 'feux-stop',                        label: 'Feux stop',                         cat: 'int' },
  { key: 'gilet-visibilite',                 label: 'Gilet de visibilité',               cat: 'int' },
  { key: 'indicateur-carburant',             label: 'Indicateur de carburant',           cat: 'int' },
  { key: 'isofix',                           label: 'Fixations ISOFIX',                  cat: 'int' },
  { key: 'limiteur-vitesse',                 label: 'Limiteur de vitesse',               cat: 'int' },
  { key: 'recyclage-air',                    label: "Recyclage d'air habitacle",         cat: 'int' },
  { key: 'reglage-appui-tete',               label: 'Réglage appui-tête',               cat: 'int' },
  { key: 'reglage-hauteur-feux',             label: 'Réglage hauteur des feux',          cat: 'int' },
  { key: 'reglage-volant',                   label: 'Réglage colonne de direction',      cat: 'int' },
  { key: 'regulateur-vitesse',               label: 'Régulateur de vitesse',             cat: 'int' },
  { key: 'retroviseur-nuit',                 label: 'Rétroviseur antiéblouissant',       cat: 'int' },
  { key: 'securite-enfant',                  label: 'Sécurité enfant portière',          cat: 'int' },
  { key: 'triangle-presignalisation',        label: 'Triangle de présignalisation',      cat: 'int' },
  { key: 'voyant-ceinture',                  label: 'Voyant ceinture de sécurité',       cat: 'int' },
  { key: 'voyant-defaut-batterie',           label: 'Voyant défaut batterie',            cat: 'int' },
  { key: 'voyant-portiere',                  label: 'Voyant portière ouverte',           cat: 'int' },
  { key: 'voyant-pression-huile',            label: 'Voyant pression huile',             cat: 'int' },
  { key: 'voyant-pression-pneu',             label: 'Voyant pression des pneus',         cat: 'int' },
  { key: 'voyant-temperature',               label: 'Voyant température moteur',         cat: 'int' },
  // --- Extérieur ---
  { key: 'ampoule-arriere',                  label: 'Ampoule feu arrière',               cat: 'ext' },
  { key: 'ampoule-avant',                    label: 'Ampoule feu avant',                 cat: 'ext' },
  { key: 'balais-essuie-glace',              label: "Balais d'essuie-glace",             cat: 'ext' },
  { key: 'capot-ouverture',                  label: 'Ouverture du capot',                cat: 'ext' },
  { key: 'clignotants-trottoir',             label: 'Clignotants côté trottoir',         cat: 'ext' },
  { key: 'coffre-ouverture',                 label: 'Ouverture du coffre',               cat: 'ext' },
  { key: 'dispositifs-reflechissants',       label: 'Dispositifs réfléchissants',        cat: 'ext' },
  { key: 'eclairage-plaque',                 label: 'Éclairage plaque arrière',          cat: 'ext' },
  { key: 'emplacement-batterie',             label: 'Emplacement de la batterie',        cat: 'ext' },
  { key: 'flanc-pneu',                       label: 'Flanc du pneu',                     cat: 'ext' },
  { key: 'gicleurs-lave-glace',              label: 'Gicleurs lave-glace',               cat: 'ext' },
  { key: 'niveau-huile-moteur',              label: 'Niveau huile moteur',               cat: 'ext' },
  { key: 'niveau-liquide-frein',             label: 'Niveau liquide de frein',           cat: 'ext' },
  { key: 'plaque-pression-pneu',             label: 'Plaque pression recommandée',       cat: 'ext' },
  { key: 'plaques-immatriculation',          label: "Plaques d'immatriculation",         cat: 'ext' },
  { key: 'remplissage-huile',                label: 'Remplissage huile moteur',          cat: 'ext' },
  { key: 'remplissage-lave-glace',           label: 'Remplissage lave-glace',            cat: 'ext' },
  { key: 'remplissage-refroidissement',      label: 'Liquide de refroidissement',        cat: 'ext' },
  { key: 'temoin-usure-pneu',                label: "Témoin d'usure des pneus",          cat: 'ext' },
  { key: 'trappe-carburant',                 label: 'Trappe carburant',                  cat: 'ext' },
]

// État
const state = {}
GESTES.forEach(g => state[g.key] = 'pending')

let currentFilter = 'all'

function updateStats() {
  const ok = Object.values(state).filter(v => v === 'ok').length
  const ko = Object.values(state).filter(v => v === 'ko').length
  const pending = Object.values(state).filter(v => v === 'pending').length
  document.getElementById('stat-ok').textContent = ok
  document.getElementById('stat-ko').textContent = ko
  document.getElementById('stat-pending').textContent = pending
}

function filter(f) {
  currentFilter = f
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
  event.target.classList.add('active')

  document.querySelectorAll('.card').forEach(card => {
    const key = card.dataset.key
    const g   = GESTES.find(x => x.key === key)
    const s   = state[key]

    let show = false
    if (f === 'all')     show = true
    if (f === 'int')     show = g.cat === 'int'
    if (f === 'ext')     show = g.cat === 'ext'
    if (f === 'ko')      show = s === 'ko'
    if (f === 'pending') show = s === 'pending'

    card.classList.toggle('hidden', !show)
  })
}

function setStatus(key, status) {
  state[key] = status
  const card = document.querySelector(`[data-key="${key}"]`)
  card.classList.remove('ok', 'ko')
  if (status !== 'pending') card.classList.add(status)
  updateStats()
}

function copyKo() {
  const ko = Object.entries(state)
    .filter(([, v]) => v === 'ko')
    .map(([k]) => k)

  if (ko.length === 0) {
    alert('✓ Aucune image à remplacer — tout est validé !')
    return
  }

  const text = '❌ Images à remplacer :\n' + ko.map(k => `- ${k}`).join('\n')
  navigator.clipboard.writeText(text).then(() => {
    const box = document.getElementById('result-box')
    box.style.display = 'block'
    box.textContent = text + '\n\n→ Colle ça dans Claude pour remplacement automatique.'
  })
}

// Construire la grille
const grid = document.getElementById('grid')
GESTES.forEach(g => {
  const card = document.createElement('div')
  card.className = 'card'
  card.dataset.key = g.key
  card.innerHTML = `
    <img class="card__img" src="/images/questions/${g.key}/correct.jpg"
         onerror="this.src='/images/questions/${g.key}/correct.svg';this.onerror=null"
         alt="${g.label}" loading="lazy" />
    <div class="card__body">
      <div class="card__key">${g.key}</div>
      <span class="card__cat card__cat--${g.cat}">${g.cat === 'int' ? 'VI · intérieur' : 'VE · extérieur'}</span>
      <div class="card__label">${g.label}</div>
      <div class="card__actions">
        <button class="btn-ok" onclick="setStatus('${g.key}', '${g.key}' in state && state['${g.key}'] === 'ok' ? 'pending' : 'ok')">✓ OK</button>
        <button class="btn-ko" onclick="setStatus('${g.key}', '${g.key}' in state && state['${g.key}'] === 'ko' ? 'pending' : 'ko')">✕ Remplacer</button>
      </div>
    </div>
  `
  grid.appendChild(card)
})

updateStats()
</script>
</body>
</html>
