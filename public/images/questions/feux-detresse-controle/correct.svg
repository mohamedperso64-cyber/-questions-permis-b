  <!-- Emoji centré -->
  <text x="300" y="225" text-anchor="middle" dominant-baseline="central"
        font-size="100"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">⚠️</text>
